name: PR Validation

on:
  pull_request:
    types: [opened, edited, labeled, unlabeled, synchronize]

jobs:
  check-issue-reference:
    name: Check Issue Reference
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR links an issue
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const issuePattern = /(?:closes|fixes|resolves)\s+#(\d+)/gi;
            const matches = [...body.matchAll(issuePattern)];

            if (matches.length === 0) {
              core.setFailed(
                'PR must reference an approved issue with "Closes #N", "Fixes #N", or "Resolves #N".'
              );
            }

  check-issue-approved:
    name: Check Issue Has status:approved
    runs-on: ubuntu-latest
    needs: check-issue-reference
    steps:
      - name: Verify linked issue is approved
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.pull_request.body || '';
            const issuePattern = /(?:closes|fixes|resolves)\s+#(\d+)/gi;
            const matches = [...body.matchAll(issuePattern)];

            if (matches.length === 0) {
              core.setFailed('No issue reference found in PR body.');
              return;
            }

            const failures = [];
            for (const match of matches) {
              const issueNumber = parseInt(match[1], 10);
              const response = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
              });

              const labels = response.data.labels.map(l => l.name);
              if (!labels.includes('status:approved')) {
                failures.push(`Issue #${issueNumber} is missing status:approved.`);
              }
            }

            if (failures.length > 0) {
              core.setFailed(failures.join('\n'));
            }

  check-type-label:
    name: Check PR Has type:* Label
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR has a type label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const labels = pullRequest.labels.map(l => l.name);
            const typeLabels = labels.filter(l => l.startsWith('type:'));

            if (typeLabels.length !== 1) {
              core.setFailed('PR must have exactly one type:* label.');
            }

  check-handlend-context:
    name: Check HandLend Context
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR template fields are filled
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const requiredSnippets = [
              'actor(s) affected:',
              'flow or slice affected:',
              'screens affected:',
              'SDD alignment:',
              'Stack alignment:',
              'UX alignment:'
            ];

            const missing = requiredSnippets.filter(text => !body.includes(text));
            if (missing.length > 0) {
              core.setFailed(
                'PR body must keep the HandLend context sections: ' + missing.join(', ')
              );
            }
