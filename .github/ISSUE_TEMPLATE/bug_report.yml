name: HandLend Bug Report
description: Report a product, documentation, or flow bug in HandLend
labels: ["bug", "status:needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        # Bug Report

        Describe the bug in terms of actor, flow, and expected HandLend behavior.

  - type: dropdown
    id: actor
    attributes:
      label: Affected Actor
      options:
        - Donor
        - Coordinator
        - Operator
        - Shared / Multiple actors
    validations:
      required: true

  - type: checkboxes
    id: screens
    attributes:
      label: Affected Screens
      options:
        - label: D-01 Disaster selection
        - label: D-02 Logistics comparison
        - label: D-03 Company profile
        - label: D-04 Wallet / contribution
        - label: D-05 Reporting timeline
        - label: C-01 Legal registration
        - label: C-02 Operational planning
        - label: C-03 Operator CRUD
        - label: C-04 Coordinator dashboard
        - label: O-01 Delivery capture
        - label: O-02 Settlement / closure

  - type: textarea
    id: bug
    attributes:
      label: Bug Description
      description: What is wrong?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected HandLend Behavior
      description: Describe what should happen according to the repo docs or source PDFs.
    validations:
      required: true

  - type: checkboxes
    id: capabilities
    attributes:
      label: Related Capability
      options:
        - label: Escrow / funding commitment
        - label: GenLayer analysis or validation
        - label: Timeline / reporting
        - label: Offline queue / sync
        - label: Coordinator planning or operator management
        - label: Documentation mismatch with source PDFs

  - type: textarea
    id: evidence
    attributes:
      label: Logs, Screenshots, or Notes
      render: shell
    validations:
      required: false

  - type: textarea
    id: pdf_alignment
    attributes:
      label: Source PDF Reference
      description: Note which source document or screen definition this bug conflicts with.
    validations:
      required: true
